blueprint:
  name: Rotary Encoder Speed-Sensitive RGB Color Light
  description: >
    Controls a dimmable/color light with three modes selectable by the encoder button.
    Brightness step size scales automatically with how fast you spin — measured on the 
    ESP32 itself (1 ms resolution) so speed classification is clean and jitter-free.

    Requires the updated rotary-lightswitch ESPHome firmware which publishes
    an "Encoder Speed" sensor (det/s, signed: + = CW, − = CCW).

    Behavior:
      - Single press:  toggle light on/off (in normal and CT mode); in hue mode, toggles between
        saturation adjust and hue adjust (does not toggle the light).
      - Rotate (normal mode): dim / brighten (speed-sensitive)
      - Double press:  enter hue mode; rotate adjusts saturation first (visible colour even from white);
        single-press switches to hue-angle adjust and back; double-press again (or timeout) to exit
      - Long press:    enter colour-temperature mode (fires mid-hold once the hold time is reached — flash new firmware);
        rotate to change CT in Kelvin-sized steps; long-press again (or timeout) to exit
      - Knob LED (optional): RGB-only proxy — off in normal when the room light is on or the sun is up;
        soft orange night glow when the main light is off after sunset (normal mode only); HS→RGB in hue mode;
        in CT mode, amber↔blue-white RGB (main light still uses color_temp_kelvin).
      - The timer resets on every rotation and when single-pressing in hue mode (sub-mode toggle).
  domain: automation

  input:
    light_entity:
      name: Light
      description: Dimmable/colour light to control.
      selector:
        entity:
          domain: light

    feedback_light_entity:
      name: Knob LED (optional)
      description: >
        RGB-only indicator (e.g. ESPHome "Knob LED") — no white or CT channel.
        Off in normal mode when the room light is on or the sun is up; soft orange at night when the main
        light is off (normal mode only); in hue mode mirrors the main light via computed RGB;
        in CT mode shows warm↔cool using RGB only (approximate white balance, not a CT command).
        Leave empty to disable LED feedback entirely.
      default: []
      selector:
        entity:
          domain: light

    encoder_speed_entity:
      name: Encoder Speed sensor
      description: >
        The "Encoder Speed" sensor from the ESPHome device. Publishes a signed
        float (det/s) on every detent: positive = clockwise, negative = CCW.
      selector:
        entity:
          domain: sensor

    button_single:
      name: Single-press binary sensor
      description: Pulses on a single press (e.g. "Button Single").
      selector:
        entity:
          domain: binary_sensor

    button_double:
      name: Double-press binary sensor
      description: Pulses on a double press (e.g. "Button Double") — enters/exits hue mode.
      selector:
        entity:
          domain: binary_sensor

    button_long:
      name: Long-press binary sensor
      description: Pulses on a long press (e.g. "Button Long") — enters/exits CT mode.
      selector:
        entity:
          domain: binary_sensor

    mode_select_entity:
      name: Mode helper (input_select)
      description: >
        Create an input_select with exactly these three options (in this order):
        normal, hue, color_temp
      selector:
        entity:
          domain: input_select

    hue_submode_entity:
      name: Hue sub-mode helper (input_select)
      description: >
        While in hue mode, whether the knob changes saturation or hue angle.
        Create an input_select with exactly these two options: saturation, hue
        (order does not matter). Reset automatically when entering hue mode and when leaving it.
      selector:
        entity:
          domain: input_select

    exit_timer_entity:
      name: Exit timer
      description: >
        Timer that auto-exits hue/CT mode after inactivity.
        Each encoder rotation resets it, so the mode persists while you're actively turning.
      selector:
        entity:
          domain: timer

    # ── Speed thresholds ────────────────────────────────────────────────────
    slow_threshold:
      name: Slow / medium threshold (det/s)
      description: >
        Turns slower than this are "slow". Typical deliberate single-detent
        turn is around 1–3 det/s; a comfortable sweep is 5–10 det/s.
      default: 3.0
      selector:
        number:
          min: 0.5
          max: 10.0
          step: 0.5
          unit_of_measurement: "det/s"

    fast_threshold:
      name: Medium / fast threshold (det/s)
      description: Turns faster than this are "fast".
      default: 8.0
      selector:
        number:
          min: 2.0
          max: 25.0
          step: 0.5
          unit_of_measurement: "det/s"

    # ── Brightness step sizes ─────────────────────────────────────────────────
    brightness_step_slow:
      name: Brightness slow step (% per detent)
      description: Brightness change per detent for a slow, deliberate turn.
      default: 3
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "%"

    brightness_step_medium:
      name: Brightness medium step (% per detent)
      description: Brightness change per detent at a comfortable sweep speed.
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "%"

    brightness_step_fast:
      name: Brightness fast step (% per detent)
      description: Brightness change per detent when spinning quickly.
      default: 25
      selector:
        number:
          min: 5
          max: 50
          step: 1
          unit_of_measurement: "%"

    # ── Hue step sizes ──────────────────────────────────────────────────────
    hue_step_slow:
      name: Hue slow step (degrees per detent)
      description: Hue change per detent for a slow turn.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "°"

    hue_step_medium:
      name: Hue medium step (degrees per detent)
      description: Hue change per detent at a comfortable sweep speed.
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "°"

    hue_step_fast:
      name: Hue fast step (degrees per detent)
      description: Hue change per detent when spinning quickly.
      default: 20
      selector:
        number:
          min: 5
          max: 60
          step: 1
          unit_of_measurement: "°"

    # ── Saturation step sizes (hue mode, saturation sub-mode) ────────────────
    saturation_step_slow:
      name: Saturation slow step (% per detent)
      description: Saturation change per detent (0–100) for a slow turn in hue mode.
      default: 5
      selector:
        number:
          min: 1
          max: 25
          step: 1
          unit_of_measurement: "%"

    saturation_step_medium:
      name: Saturation medium step (% per detent)
      description: Saturation change per detent at a comfortable sweep speed.
      default: 10
      selector:
        number:
          min: 1
          max: 40
          step: 1
          unit_of_measurement: "%"

    saturation_step_fast:
      name: Saturation fast step (% per detent)
      description: Saturation change per detent when spinning quickly.
      default: 20
      selector:
        number:
          min: 5
          max: 50
          step: 1
          unit_of_measurement: "%"

    # ── Color temperature step sizes (Kelvin; service color_temp_kelvin) ────
    color_temp_kelvin_step_slow:
      name: Colour temperature slow step (Kelvin per detent)
      description: >
        Uses light.turn_on color_temp_kelvin. CW = warmer (lower Kelvin), CCW = cooler (higher Kelvin).
      default: 250
      selector:
        number:
          min: 25
          max: 600
          step: 25
          unit_of_measurement: K

    color_temp_kelvin_step_medium:
      name: Colour temperature medium step (Kelvin per detent)
      description: Kelvin change per detent at a comfortable spin speed.
      default: 450
      selector:
        number:
          min: 50
          max: 1200
          step: 25
          unit_of_measurement: K

    color_temp_kelvin_step_fast:
      name: Colour temperature fast step (Kelvin per detent)
      description: Kelvin change per detent when spinning quickly.
      default: 900
      selector:
        number:
          min: 100
          max: 2500
          step: 50
          unit_of_measurement: K

    # ── Rotation direction ────────────────────────────────────────────────────
    reverse_rotation:
      name: Reverse rotation direction
      description: >-
        Check to swap the increase/decrease direction. Use this if your encoder
        is wired so that clockwise turns decrease values instead of increasing.
      default: false
      selector:
        boolean:

    # ── Transition time ─────────────────────────────────────────────────────
    transition_time:
      name: Transition time (ms)
      description: >
        How long the light takes to reach the new value. Shorter
        values feel snappier; longer values smooth out rapid successive steps.
        50–250 ms is a good starting point.
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: ms

    timeout_seconds:
      name: Hue / CT mode timeout (seconds)
      description: Returns to normal mode this many seconds after the last rotation or mode entry.
      default: 30
      selector:
        number:
          min: 10
          max: 120
          step: 5
          unit_of_measurement: s

    enable_knob_night_light:
      name: Knob night light
      description: >
        When the main light is off, the sun is below the horizon, and the encoder is in normal mode
        (not hue or colour-temperature mode), glow the knob LED soft orange so you can find the switch.
        Requires the Sun integration (sun.sun).
      default: true
      selector:
        boolean:

    night_light_brightness_pct:
      name: Night light brightness (%)
      description: Brightness for the soft orange night glow (main light must be off).
      default: 14
      selector:
        number:
          min: 1
          max: 40
          step: 1
          unit_of_measurement: "%"

variables:
  light: !input light_entity
  feedback_light: !input feedback_light_entity
  mode_select: !input mode_select_entity
  slow_threshold_val: !input slow_threshold
  fast_threshold_val: !input fast_threshold
  brightness_step_slow_val: !input brightness_step_slow
  brightness_step_medium_val: !input brightness_step_medium
  brightness_step_fast_val: !input brightness_step_fast
  hue_step_slow_val: !input hue_step_slow
  hue_step_medium_val: !input hue_step_medium
  hue_step_fast_val: !input hue_step_fast
  hue_submode: !input hue_submode_entity
  saturation_step_slow_val: !input saturation_step_slow
  saturation_step_medium_val: !input saturation_step_medium
  saturation_step_fast_val: !input saturation_step_fast
  kelvin_step_slow_val: !input color_temp_kelvin_step_slow
  kelvin_step_medium_val: !input color_temp_kelvin_step_medium
  kelvin_step_fast_val: !input color_temp_kelvin_step_fast
  reverse_rotation_val: !input reverse_rotation
  transition_time_val: !input transition_time
  timeout_seconds_value: !input timeout_seconds
  enable_knob_night_light_val: !input enable_knob_night_light
  night_light_brightness_pct_val: !input night_light_brightness_pct

trigger:
  - id: knob_night_sync
    platform: state
    entity_id:
      - sun.sun
      - !input light_entity

  - id: encoder
    platform: state
    entity_id: !input encoder_speed_entity

  - id: button_single
    platform: state
    entity_id: !input button_single
    from: "off"
    to: "on"

  - id: button_double
    platform: state
    entity_id: !input button_double
    from: "off"
    to: "on"

  - id: button_long
    platform: state
    entity_id: !input button_long
    from: "off"
    to: "on"

  - id: timer_finished
    platform: state
    entity_id: !input exit_timer_entity
    from: "active"
    to: "idle"

action:
  - choose:

      # ── Sun or main light changed → refresh night glow (normal mode only) ──
      - conditions:
          - condition: trigger
            id: knob_night_sync
        sequence:
          - if:
              - condition: template
                value_template: "{{ feedback_light != [] }}"
            then:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ enable_knob_night_light_val and states(mode_select) == 'normal'
                             and is_state(light, 'off') and is_state('sun.sun', 'below_horizon') }}
                    sequence:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          brightness_pct: "{{ night_light_brightness_pct_val }}"
                          rgb_color: [255, 72, 12]
                  - conditions:
                      - condition: template
                        value_template: "{{ states(mode_select) == 'normal' }}"
                    sequence:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity

      # ── Timer expired → return to normal ──────────────────────────
      - conditions:
          - condition: trigger
            id: timer_finished
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input mode_select_entity
            data:
              option: normal
          - service: input_select.select_option
            target:
              entity_id: !input hue_submode_entity
            data:
              option: saturation
          - if:
              - condition: template
                value_template: "{{ feedback_light != [] }}"
            then:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ enable_knob_night_light_val and is_state(light, 'off')
                             and is_state('sun.sun', 'below_horizon') }}
                    sequence:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          brightness_pct: "{{ night_light_brightness_pct_val }}"
                          rgb_color: [255, 72, 12]
                default:
                  - service: light.turn_off
                    target:
                      entity_id: !input feedback_light_entity

      # ── Single press: toggle light, or in hue mode flip sat ↔ hue ──
      - conditions:
          - condition: trigger
            id: button_single
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(hue_submode) == 'saturation' }}"
                        sequence:
                          - service: input_select.select_option
                            target:
                              entity_id: !input hue_submode_entity
                            data:
                              option: hue
                    default:
                      - service: input_select.select_option
                        target:
                          entity_id: !input hue_submode_entity
                        data:
                          option: saturation
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"
            default:
              - variables:
                  light_was_on: "{{ is_state(light, 'on') }}"
              - service: light.toggle
                target:
                  entity_id: !input light_entity
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {{ light_was_on and enable_knob_night_light_val
                                 and is_state('sun.sun', 'below_horizon') }}
                        sequence:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              brightness_pct: "{{ night_light_brightness_pct_val }}"
                              rgb_color: [255, 72, 12]
                    default:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity

      # ── Double press: toggle hue mode ──────────────────────────────
      # Press while in hue mode → exit; press from any other mode → enter hue mode.
      - conditions:
          - condition: trigger
            id: button_double
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: input_select.select_option
                    target:
                      entity_id: !input hue_submode_entity
                    data:
                      option: saturation
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: >
                                  {{ enable_knob_night_light_val and is_state(light, 'off')
                                     and is_state('sun.sun', 'below_horizon') }}
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  brightness_pct: "{{ night_light_brightness_pct_val }}"
                                  rgb_color: [255, 72, 12]
                        default:
                          - service: light.turn_off
                            target:
                              entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: hue
              - service: input_select.select_option
                target:
                  entity_id: !input hue_submode_entity
                data:
                  option: saturation
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              # Set knob LED to the current hue of the controlled light
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _hs: "{{ state_attr(light, 'hs_color') }}"
                      _h: "{{ (_hs[0] if _hs else 0) | float }}"
                      _s: "{{ ((_hs[1] if _hs else 100) / 100) | float }}"
                      _c: "{{ _s }}"
                      _x: "{{ _c * (1 - ((_h / 60) % 2 - 1) | abs) }}"
                      _m: "{{ 1.0 - _c }}"
                      _i: "{{ (_h | int) // 60 }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input feedback_light_entity
                    data:
                      rgb_color:
                        - "{{ (([_c, _x, 0, 0, _x, _c][_i | int] + _m) * 255) | int }}"
                        - "{{ (([_x, _c, _c, _x, 0, 0][_i | int] + _m) * 255) | int }}"
                        - "{{ (([0, 0, _x, _c, _c, _x][_i | int] + _m) * 255) | int }}"

      # ── Long press: toggle colour-temperature mode ─────────────────
      # Press while in color_temp mode → exit; otherwise → enter CT mode.
      - conditions:
          - condition: trigger
            id: button_long
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: >
                                  {{ enable_knob_night_light_val and is_state(light, 'off')
                                     and is_state('sun.sun', 'below_horizon') }}
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  brightness_pct: "{{ night_light_brightness_pct_val }}"
                                  rgb_color: [255, 72, 12]
                        default:
                          - service: light.turn_off
                            target:
                              entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: color_temp
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              # Knob LED (RGB only): proxy warm↔cool; _t=0 warm low-K, _t=1 cool high-K
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _min_k: >-
                        {% set k = state_attr(light, 'min_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'max_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'max_mireds') | float)) | round(0) | int }}
                        {% else %}
                          2000
                        {% endif %}
                      _max_k: >-
                        {% set k = state_attr(light, 'max_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'min_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'min_mireds') | float)) | round(0) | int }}
                        {% else %}
                          6500
                        {% endif %}
                      _cur_k: >-
                        {% set k = state_attr(light, 'color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'color_temp') is not none and state_attr(light, 'color_temp') | float(0) > 0 %}
                          {{ (1000000 / (state_attr(light, 'color_temp') | float)) | round(0) | int }}
                        {% else %}
                          {{ (((_min_k | float) + (_max_k | float)) / 2) | round(0) | int }}
                        {% endif %}
                      _span: "{{ [((_max_k | float) - (_min_k | float)), 1] | max }}"
                      _t: "{{ [[(((_cur_k | float) - (_min_k | float)) / (_span | float)), 0] | max, 1] | min }}"
                      # Legacy curve was t=0 cool / t=1 warm; Kelvin _t is opposite — use (1 - _t).
                      _r: "{{ (200 + 55 * (1 - (_t | float))) | int }}"
                      _g: "{{ (220 - 73 * (1 - (_t | float))) | int }}"
                      _b: "{{ (255 - 214 * (1 - (_t | float))) | int }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input feedback_light_entity
                    data:
                      brightness_pct: 85
                      rgb_color:
                        - "{{ _r }}"
                        - "{{ _g }}"
                        - "{{ _b }}"

      # ── Brightness adjustment on encoder turn ─────────────────────────────
      - conditions:
          - condition: trigger
            id: encoder
          # Ignore the unavailable / non-numeric states that can appear briefly
          - condition: template
            value_template: >-
              {{ trigger.to_state.state | float(none) is not none
                 and trigger.to_state.state != 'unavailable'
                 and trigger.to_state.state != 'unknown' }}
        sequence:
          - variables:
              speed_val: "{{ trigger.to_state.state | float(0) }}"
              abs_speed: "{{ speed_val | abs }}"
              # −1 for CW (increase), +1 for CCW (decrease); reversed by checkbox
              direction: "{{ (1 if reverse_rotation_val else -1) if speed_val >= 0 else (-1 if reverse_rotation_val else 1) }}"
              brightness_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ brightness_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ brightness_step_medium_val }}
                {% else %}
                  {{ brightness_step_slow_val }}
                {% endif %}
              hue_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ hue_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ hue_step_medium_val }}
                {% else %}
                  {{ hue_step_slow_val }}
                {% endif %}
              saturation_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ saturation_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ saturation_step_medium_val }}
                {% else %}
                  {{ saturation_step_slow_val }}
                {% endif %}
              kelvin_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ kelvin_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ kelvin_step_medium_val }}
                {% else %}
                  {{ kelvin_step_slow_val }}
                {% endif %}
          - choose:

              # Normal mode: brightness adjustment
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'normal' }}"
                sequence:
                  - variables:
                      current_pct: >-
                        {{ ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0) }}
                      new_pct: >-
                        {{ [1, [(current_pct | int) + (direction | int) * (brightness_step | int), 100] | min] | max }}
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      brightness_pct: "{{ new_pct }}"
                      transition: "{{ transition_time_val / 1000 }}"

              # Hue mode: saturation (default) or hue angle, by sub-mode helper
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - choose:
                      # Saturation sub-mode: keep hue, change S (0–100)
                      - conditions:
                          - condition: template
                            value_template: "{{ states(hue_submode) == 'saturation' }}"
                        sequence:
                          - variables:
                              _hs: "{{ state_attr(light, 'hs_color') }}"
                              _cur_h: "{{ (_hs[0] if _hs else 0) | float }}"
                              _cur_s: "{{ (_hs[1] if _hs else 0) | float }}"
                              _new_s: "{{ [0, [(_cur_s | float) + (direction | int) * (saturation_step | int), 100] | min] | max }}"
                              _s_: "{{ (_new_s / 100) | float }}"
                              _c_: "{{ _s_ }}"
                              _x_: "{{ _c_ * (1 - ((_cur_h / 60) % 2 - 1) | abs) }}"
                              _m_: "{{ 1.0 - _c_ }}"
                              _i_: "{{ (_cur_h | int) // 60 }}"
                          - service: light.turn_on
                            target:
                              entity_id: !input light_entity
                            data:
                              hs_color:
                                - "{{ _cur_h }}"
                                - "{{ _new_s }}"
                              transition: "{{ transition_time_val / 1000 }}"
                          - if:
                              - condition: template
                                value_template: "{{ feedback_light != [] }}"
                            then:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color:
                                    - "{{ (([_c_, _x_, 0, 0, _x_, _c_][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([_x_, _c_, _c_, _x_, 0, 0][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([0, 0, _x_, _c_, _c_, _x_][_i_ | int] + _m_) * 255) | int }}"
                          - service: timer.start
                            target:
                              entity_id: !input exit_timer_entity
                            data:
                              duration: "{{ timeout_seconds_value }}"
                      # Hue-angle sub-mode: keep saturation, change H
                      - conditions:
                          - condition: template
                            value_template: "{{ states(hue_submode) == 'hue' }}"
                        sequence:
                          - variables:
                              _hs: "{{ state_attr(light, 'hs_color') }}"
                              _cur_h: "{{ (_hs[0] if _hs else 0) | float }}"
                              _cur_s: "{{ (_hs[1] if _hs else 100) | float }}"
                              _new_h: "{{ (_cur_h + (direction | int) * (hue_step | int)) % 360 }}"
                              _s_: "{{ (_cur_s / 100) | float }}"
                              _c_: "{{ _s_ }}"
                              _x_: "{{ _c_ * (1 - ((_new_h / 60) % 2 - 1) | abs) }}"
                              _m_: "{{ 1.0 - _c_ }}"
                              _i_: "{{ (_new_h | int) // 60 }}"
                          - service: light.turn_on
                            target:
                              entity_id: !input light_entity
                            data:
                              hs_color:
                                - "{{ _new_h }}"
                                - "{{ _cur_s }}"
                              transition: "{{ transition_time_val / 1000 }}"
                          - if:
                              - condition: template
                                value_template: "{{ feedback_light != [] }}"
                            then:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color:
                                    - "{{ (([_c_, _x_, 0, 0, _x_, _c_][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([_x_, _c_, _c_, _x_, 0, 0][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([0, 0, _x_, _c_, _c_, _x_][_i_ | int] + _m_) * 255) | int }}"
                          - service: timer.start
                            target:
                              entity_id: !input exit_timer_entity
                            data:
                              duration: "{{ timeout_seconds_value }}"

              # Color temperature mode: Kelvin via color_temp_kelvin (works with modern HA attrs)
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - variables:
                      _min_k: >-
                        {% set k = state_attr(light, 'min_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'max_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'max_mireds') | float)) | round(0) | int }}
                        {% else %}
                          2000
                        {% endif %}
                      _max_k: >-
                        {% set k = state_attr(light, 'max_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'min_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'min_mireds') | float)) | round(0) | int }}
                        {% else %}
                          6500
                        {% endif %}
                      _cur_k: >-
                        {% set k = state_attr(light, 'color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'color_temp') is not none and state_attr(light, 'color_temp') | float(0) > 0 %}
                          {{ (1000000 / (state_attr(light, 'color_temp') | float)) | round(0) | int }}
                        {% else %}
                          {{ (((_min_k | float) + (_max_k | float)) / 2) | round(0) | int }}
                        {% endif %}
                      _new_k: "{{ [_min_k | int, [_max_k | int, (_cur_k | int) - (direction | int) * (kelvin_step | int)] | min] | max }}"
                      _span: "{{ [((_max_k | float) - (_min_k | float)), 1] | max }}"
                      _t: "{{ [[(((_new_k | float) - (_min_k | float)) / (_span | float)), 0] | max, 1] | min }}"
                      _r: "{{ (200 + 55 * (1 - (_t | float))) | int }}"
                      _g: "{{ (220 - 73 * (1 - (_t | float))) | int }}"
                      _b: "{{ (255 - 214 * (1 - (_t | float))) | int }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      color_temp_kelvin: "{{ _new_k }}"
                      transition: "{{ transition_time_val / 1000 }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          brightness_pct: 85
                          rgb_color:
                            - "{{ _r }}"
                            - "{{ _g }}"
                            - "{{ _b }}"
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

mode: restart
