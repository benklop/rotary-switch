blueprint:
  name: Rotary Encoder Full Color Light (CW/CCW)
  description: >
    Controls a dimmable/color light with three modes selectable by the encoder button.
    • Single press  → toggle on/off
    • Rotate (normal mode) → dim / brighten
    • Double press  → enter hue mode; rotate to cycle colour; double-press again (or timeout) to exit
    • Long press    → enter colour-temperature mode; rotate to change CT; long-press again (or timeout) to exit
    Knob LED (optional): off in normal mode, mirrors the light's current hue in hue mode,
    and shifts between warm amber and cool blue in CT mode. The timer resets on every rotation
    so the mode only exits after a period of inactivity.
  domain: automation

  input:
    light_entity:
      name: Light
      description: Dimmable/colour light to control.
      selector:
        entity:
          domain: light

    feedback_light_entity:
      name: Knob LED (optional)
      description: >
        RGB light used as mode indicator (e.g. the ESPHome "Knob LED").
        Off in normal mode; tracks light hue in hue mode;
        shows warm (amber) ↔ cool (blue-white) in CT mode.
        Leave empty to disable LED feedback entirely.
      default: []
      selector:
        entity:
          domain: light

    encoder_cw:
      name: Encoder CW binary sensor
      description: Pulses on each clockwise detent (e.g. "Encoder CW" from ESPHome).
      selector:
        entity:
          domain: binary_sensor

    encoder_ccw:
      name: Encoder CCW binary sensor
      description: Pulses on each counter-clockwise detent.
      selector:
        entity:
          domain: binary_sensor

    button_single:
      name: Single-press binary sensor
      description: Pulses on a single press (e.g. "Button Single").
      selector:
        entity:
          domain: binary_sensor

    button_double:
      name: Double-press binary sensor
      description: Pulses on a double press (e.g. "Button Double") — enters/exits hue mode.
      selector:
        entity:
          domain: binary_sensor

    button_long:
      name: Long-press binary sensor
      description: Pulses on a long press (e.g. "Button Long") — enters/exits CT mode.
      selector:
        entity:
          domain: binary_sensor

    mode_select_entity:
      name: Mode helper (input_select)
      description: >
        Create an input_select with exactly these three options (in this order):
        normal, hue, color_temp
      selector:
        entity:
          domain: input_select

    exit_timer_entity:
      name: Exit timer
      description: >
        Timer that auto-exits hue/CT mode after inactivity.
        Each encoder rotation resets it, so the mode persists while you're actively turning.
      selector:
        entity:
          domain: timer

    brightness_step:
      name: Brightness step per detent
      default: 5
      selector:
        number:
          min: 1
          max: 25
          step: 1
          unit_of_measurement: "%"

    hue_step:
      name: Hue step per detent (degrees, 0–360)
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "°"

    mired_step:
      name: Colour temperature step per detent (mireds)
      description: "CW = warmer (higher mireds / lower Kelvin), CCW = cooler."
      default: 10
      selector:
        number:
          min: 5
          max: 50
          step: 5

    timeout_seconds:
      name: Hue / CT mode timeout (seconds)
      description: Returns to normal mode this many seconds after the last rotation or mode entry.
      default: 30
      selector:
        number:
          min: 10
          max: 120
          step: 5
          unit_of_measurement: s

variables:
  light: !input light_entity
  feedback_light: !input feedback_light_entity
  mode_select: !input mode_select_entity
  brightness_step_value: !input brightness_step
  hue_step_value: !input hue_step
  mired_step_value: !input mired_step
  timeout_seconds_value: !input timeout_seconds

trigger:
  - id: cw
    platform: state
    entity_id: !input encoder_cw
    from: "off"
    to: "on"

  - id: ccw
    platform: state
    entity_id: !input encoder_ccw
    from: "off"
    to: "on"

  - id: button_single
    platform: state
    entity_id: !input button_single
    from: "off"
    to: "on"

  - id: button_double
    platform: state
    entity_id: !input button_double
    from: "off"
    to: "on"

  - id: button_long
    platform: state
    entity_id: !input button_long
    from: "off"
    to: "on"

  - id: timer_finished
    platform: state
    entity_id: !input exit_timer_entity
    from: "active"
    to: "idle"

action:
  - choose:

      # ── Timer expired → return to normal ──────────────────────────
      - conditions:
          - condition: trigger
            id: timer_finished
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input mode_select_entity
            data:
              option: normal
          - if:
              - condition: template
                value_template: "{{ feedback_light != [] }}"
            then:
              - service: light.turn_off
                target:
                  entity_id: !input feedback_light_entity

      # ── Single press: toggle light ─────────────────────────────────
      - conditions:
          - condition: trigger
            id: button_single
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_entity

      # ── Double press: toggle hue mode ──────────────────────────────
      # Press while in hue mode → exit; press from any other mode → enter hue mode.
      - conditions:
          - condition: trigger
            id: button_double
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: hue
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              # Set knob LED to the current hue of the controlled light
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _hs: "{{ state_attr(light, 'hs_color') }}"
                      _h: "{{ (_hs[0] if _hs else 0) | float }}"
                      _s: "{{ ((_hs[1] if _hs else 100) / 100) | float }}"
                      _c: "{{ _s }}"
                      _x: "{{ _c * (1 - ((_h / 60) % 2 - 1) | abs) }}"
                      _m: "{{ 1.0 - _c }}"
                      _i: "{{ (_h | int) // 60 }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input feedback_light_entity
                    data:
                      rgb_color:
                        - "{{ (([_c, _x, 0, 0, _x, _c][_i | int] + _m) * 255) | int }}"
                        - "{{ (([_x, _c, _c, _x, 0, 0][_i | int] + _m) * 255) | int }}"
                        - "{{ (([0, 0, _x, _c, _c, _x][_i | int] + _m) * 255) | int }}"

      # ── Long press: toggle colour-temperature mode ─────────────────
      # Press while in color_temp mode → exit; otherwise → enter CT mode.
      - conditions:
          - condition: trigger
            id: button_long
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: color_temp
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              # Set knob LED to warm↔cool colour matching current CT
              # t=0 (min_mireds, coolest) → [200, 220, 255]  (cool blue-white)
              # t=1 (max_mireds, warmest) → [255, 147,  41]  (warm amber)
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _min_m: "{{ state_attr(light, 'min_mireds') | default(153) | int }}"
                      _max_m: "{{ state_attr(light, 'max_mireds') | default(500) | int }}"
                      _cur_m: "{{ state_attr(light, 'color_temp') | default(300) | int }}"
                      _t: "{{ [[(_cur_m - _min_m) / (_max_m - _min_m), 0] | max, 1] | min }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input feedback_light_entity
                    data:
                      rgb_color:
                        - "{{ (200 + 55 * _t) | int }}"
                        - "{{ (220 - 73 * _t) | int }}"
                        - "{{ (255 - 214 * _t) | int }}"

      # ── Clockwise rotation ─────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: cw
        sequence:
          - choose:

              # Normal: brightness up
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'normal' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      brightness_pct: >-
                        {% set cur = ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0) %}
                        {{ [0, [(cur + brightness_step_value), 100] | min] | max }}

              # Hue: step hue CW, update knob LED to new hue colour
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - variables:
                      _hs: "{{ state_attr(light, 'hs_color') }}"
                      _cur_h: "{{ (_hs[0] if _hs else 0) | float }}"
                      _cur_s: "{{ (_hs[1] if _hs else 100) | float }}"
                      _new_h: "{{ (_cur_h + hue_step_value) % 360 }}"
                      _s_: "{{ (_cur_s / 100) | float }}"
                      _c_: "{{ _s_ }}"
                      _x_: "{{ _c_ * (1 - ((_new_h / 60) % 2 - 1) | abs) }}"
                      _m_: "{{ 1.0 - _c_ }}"
                      _i_: "{{ (_new_h | int) // 60 }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      hs_color:
                        - "{{ _new_h }}"
                        - "{{ _cur_s }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          rgb_color:
                            - "{{ (([_c_, _x_, 0, 0, _x_, _c_][_i_ | int] + _m_) * 255) | int }}"
                            - "{{ (([_x_, _c_, _c_, _x_, 0, 0][_i_ | int] + _m_) * 255) | int }}"
                            - "{{ (([0, 0, _x_, _c_, _c_, _x_][_i_ | int] + _m_) * 255) | int }}"
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

              # Color temp: CW = warmer (higher mireds), update knob LED
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - variables:
                      _min_m: "{{ state_attr(light, 'min_mireds') | default(153) | int }}"
                      _max_m: "{{ state_attr(light, 'max_mireds') | default(500) | int }}"
                      _cur_m: "{{ state_attr(light, 'color_temp') | default(300) | int }}"
                      _new_m: "{{ [_min_m, [_max_m, (_cur_m + mired_step_value)] | min] | max }}"
                      _t: "{{ [[(_new_m - _min_m) / (_max_m - _min_m), 0] | max, 1] | min }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      color_temp: "{{ _new_m }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          rgb_color:
                            - "{{ (200 + 55 * _t) | int }}"
                            - "{{ (220 - 73 * _t) | int }}"
                            - "{{ (255 - 214 * _t) | int }}"
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

      # ── Counter-clockwise rotation ─────────────────────────────────
      - conditions:
          - condition: trigger
            id: ccw
        sequence:
          - choose:

              # Normal: brightness down
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'normal' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      brightness_pct: >-
                        {% set cur = ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0) %}
                        {{ [0, [(cur - brightness_step_value), 100] | min] | max }}

              # Hue: step hue CCW, update knob LED to new hue colour
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - variables:
                      _hs: "{{ state_attr(light, 'hs_color') }}"
                      _cur_h: "{{ (_hs[0] if _hs else 0) | float }}"
                      _cur_s: "{{ (_hs[1] if _hs else 100) | float }}"
                      _new_h: "{{ (_cur_h - hue_step_value) % 360 }}"
                      _s_: "{{ (_cur_s / 100) | float }}"
                      _c_: "{{ _s_ }}"
                      _x_: "{{ _c_ * (1 - ((_new_h / 60) % 2 - 1) | abs) }}"
                      _m_: "{{ 1.0 - _c_ }}"
                      _i_: "{{ (_new_h | int) // 60 }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      hs_color:
                        - "{{ _new_h }}"
                        - "{{ _cur_s }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          rgb_color:
                            - "{{ (([_c_, _x_, 0, 0, _x_, _c_][_i_ | int] + _m_) * 255) | int }}"
                            - "{{ (([_x_, _c_, _c_, _x_, 0, 0][_i_ | int] + _m_) * 255) | int }}"
                            - "{{ (([0, 0, _x_, _c_, _c_, _x_][_i_ | int] + _m_) * 255) | int }}"
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

              # Color temp: CCW = cooler (lower mireds), update knob LED
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - variables:
                      _min_m: "{{ state_attr(light, 'min_mireds') | default(153) | int }}"
                      _max_m: "{{ state_attr(light, 'max_mireds') | default(500) | int }}"
                      _cur_m: "{{ state_attr(light, 'color_temp') | default(300) | int }}"
                      _new_m: "{{ [_min_m, [_max_m, (_cur_m - mired_step_value)] | min] | max }}"
                      _t: "{{ [[(_new_m - _min_m) / (_max_m - _min_m), 0] | max, 1] | min }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      color_temp: "{{ _new_m }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          rgb_color:
                            - "{{ (200 + 55 * _t) | int }}"
                            - "{{ (220 - 73 * _t) | int }}"
                            - "{{ (255 - 214 * _t) | int }}"
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

mode: restart
