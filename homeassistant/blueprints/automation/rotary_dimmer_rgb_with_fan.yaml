blueprint:
  name: Rotary Encoder Speed-Sensitive RGB Color Light + Fan
  description: >
    Controls a dimmable/color light and a fan with a rotary encoder.
    Rotation speed is measured on the ESP32 and mapped to slow/medium/fast
    step sizes for brightness, saturation, hue, colour temperature (Kelvin), and fan percentage.

    Requires the updated rotary-lightswitch ESPHome firmware which publishes
    an "Encoder Speed" sensor (det/s, signed: + = CW, − = CCW).

    Behaviour:
      - Single press: toggle light on/off in normal and CT mode; in hue mode, toggles saturation ↔ hue
        adjust (does not toggle the light).
      - Rotate (normal mode): dim / brighten (speed-sensitive)
      - Double press: if a fan button sensor is configured, enters/exits hue mode (saturation first,
        then hue — same as rotary_dimmer_rgb.yaml). If no fan button is configured, double-press
        enters/exits fan mode instead.
      - Optional fan button: when configured, enters/exits fan mode independently of double-press.
      - Long press: enter/exit colour-temperature mode; main light uses color_temp_kelvin; knob LED
        uses approximate warm↔cool RGB only.
      - Timer resets on rotation and on single-press in hue mode (sub-mode toggle).

    Optional knob LED: off in normal; mirrors HS→RGB in hue mode; red/yellow/green in fan mode;
    CT proxy in colour-temperature mode.
  domain: automation

  input:
    light_entity:
      name: Light
      description: Dimmable/colour light to control.
      selector:
        entity:
          domain: light

    fan_entity:
      name: Fan
      description: Fan to control in fan mode (percentage based).
      selector:
        entity:
          domain: fan

    feedback_light_entity:
      name: Knob LED (optional)
      description: >
        RGB-only indicator — no white or CT channel.
        Off in normal mode; mirrors the main light in hue mode; red/yellow/green in fan mode;
        warm↔cool RGB proxy in CT mode (main light still uses color_temp_kelvin).
        Leave empty to disable LED feedback.
      default: []
      selector:
        entity:
          domain: light

    encoder_speed_entity:
      name: Encoder Speed sensor
      description: >
        The "Encoder Speed" sensor from the ESPHome device. Publishes a signed
        float (det/s) on every detent: positive = clockwise, negative = CCW.
      selector:
        entity:
          domain: sensor

    button_single:
      name: Single-press binary sensor
      description: Pulses on a single press (e.g. "Button Single").
      selector:
        entity:
          domain: binary_sensor

    button_double:
      name: Double-press binary sensor
      description: >
        Hue mode when a fan button is configured; otherwise toggles fan mode (see blueprint description).
      selector:
        entity:
          domain: binary_sensor

    button_long:
      name: Long-press binary sensor
      description: Pulses on a long press — enters/exits CT mode.
      selector:
        entity:
          domain: binary_sensor

    button_fan:
      name: Fan button (optional)
      description: >
        Binary sensor for fan mode toggle. If provided, double-press controls hue mode and this
        control toggles fan mode. If omitted, double-press toggles fan mode (no separate hue entry).
      default: []
      selector:
        entity:
          domain: binary_sensor

    mode_select_entity:
      name: Mode helper (input_select)
      description: >
        Create an input_select with exactly these options (in this order):
        normal, hue, fan, color_temp
      selector:
        entity:
          domain: input_select

    hue_submode_entity:
      name: Hue sub-mode helper (input_select)
      description: >
        While in hue mode, whether the knob changes saturation or hue angle.
        Create an input_select with exactly these two options: saturation, hue
        (order does not matter). Reset automatically when entering hue mode and when leaving it.
      selector:
        entity:
          domain: input_select

    exit_timer_entity:
      name: Exit timer
      description: >
        Timer that auto-exits hue, fan, or CT mode after inactivity.
        Each encoder rotation in those modes resets it.
      selector:
        entity:
          domain: timer

    slow_threshold:
      name: Slow / medium threshold (det/s)
      description: >
        Turns slower than this are "slow". Typical deliberate single-detent
        turn is around 1–3 det/s; a comfortable sweep is 5–10 det/s.
      default: 3.0
      selector:
        number:
          min: 0.5
          max: 10.0
          step: 0.5
          unit_of_measurement: "det/s"

    fast_threshold:
      name: Medium / fast threshold (det/s)
      description: Turns faster than this are "fast".
      default: 8.0
      selector:
        number:
          min: 2.0
          max: 25.0
          step: 0.5
          unit_of_measurement: "det/s"

    brightness_step_slow:
      name: Brightness slow step (% per detent)
      description: Brightness change per detent for a slow, deliberate turn.
      default: 3
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "%"

    brightness_step_medium:
      name: Brightness medium step (% per detent)
      description: Brightness change per detent at a comfortable sweep speed.
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "%"

    brightness_step_fast:
      name: Brightness fast step (% per detent)
      description: Brightness change per detent when spinning quickly.
      default: 25
      selector:
        number:
          min: 5
          max: 50
          step: 1
          unit_of_measurement: "%"

    hue_step_slow:
      name: Hue slow step (degrees per detent)
      description: Hue change per detent for a slow turn.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "°"

    hue_step_medium:
      name: Hue medium step (degrees per detent)
      description: Hue change per detent at a comfortable sweep speed.
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "°"

    hue_step_fast:
      name: Hue fast step (degrees per detent)
      description: Hue change per detent when spinning quickly.
      default: 20
      selector:
        number:
          min: 5
          max: 60
          step: 1
          unit_of_measurement: "°"

    saturation_step_slow:
      name: Saturation slow step (% per detent)
      description: Saturation change per detent (0–100) for a slow turn in hue mode.
      default: 5
      selector:
        number:
          min: 1
          max: 25
          step: 1
          unit_of_measurement: "%"

    saturation_step_medium:
      name: Saturation medium step (% per detent)
      description: Saturation change per detent at a comfortable sweep speed.
      default: 10
      selector:
        number:
          min: 1
          max: 40
          step: 1
          unit_of_measurement: "%"

    saturation_step_fast:
      name: Saturation fast step (% per detent)
      description: Saturation change per detent when spinning quickly.
      default: 20
      selector:
        number:
          min: 5
          max: 50
          step: 1
          unit_of_measurement: "%"

    fan_step_slow:
      name: Fan slow step (% per detent)
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "%"

    fan_step_medium:
      name: Fan medium step (% per detent)
      default: 15
      selector:
        number:
          min: 1
          max: 40
          step: 1
          unit_of_measurement: "%"

    fan_step_fast:
      name: Fan fast step (% per detent)
      default: 30
      selector:
        number:
          min: 5
          max: 60
          step: 1
          unit_of_measurement: "%"

    color_temp_kelvin_step_slow:
      name: Colour temperature slow step (Kelvin per detent)
      description: >
        Uses light.turn_on color_temp_kelvin. CW = warmer (lower Kelvin), CCW = cooler (higher Kelvin).
      default: 250
      selector:
        number:
          min: 25
          max: 600
          step: 25
          unit_of_measurement: K

    color_temp_kelvin_step_medium:
      name: Colour temperature medium step (Kelvin per detent)
      description: Kelvin change per detent at a comfortable spin speed.
      default: 450
      selector:
        number:
          min: 50
          max: 1200
          step: 25
          unit_of_measurement: K

    color_temp_kelvin_step_fast:
      name: Colour temperature fast step (Kelvin per detent)
      description: Kelvin change per detent when spinning quickly.
      default: 900
      selector:
        number:
          min: 100
          max: 2500
          step: 50
          unit_of_measurement: K

    reverse_rotation:
      name: Reverse rotation direction
      description: >-
        Check to swap the increase/decrease direction. Use this if your encoder
        is wired so that clockwise turns decrease values instead of increasing.
      default: false
      selector:
        boolean:

    transition_time:
      name: Transition time (ms)
      description: >
        How long the light takes to reach the new value for brightness, hue, saturation, and CT.
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: ms

    timeout_seconds:
      name: Hue / Fan / CT mode timeout (seconds)
      description: Returns to normal mode this many seconds after the last rotation or mode entry.
      default: 30
      selector:
        number:
          min: 10
          max: 120
          step: 5
          unit_of_measurement: s

variables:
  light: !input light_entity
  fan: !input fan_entity
  feedback_light: !input feedback_light_entity
  button_fan_entities: !input button_fan
  mode_select: !input mode_select_entity
  slow_threshold_val: !input slow_threshold
  fast_threshold_val: !input fast_threshold
  brightness_step_slow_val: !input brightness_step_slow
  brightness_step_medium_val: !input brightness_step_medium
  brightness_step_fast_val: !input brightness_step_fast
  hue_step_slow_val: !input hue_step_slow
  hue_step_medium_val: !input hue_step_medium
  hue_step_fast_val: !input hue_step_fast
  hue_submode: !input hue_submode_entity
  saturation_step_slow_val: !input saturation_step_slow
  saturation_step_medium_val: !input saturation_step_medium
  saturation_step_fast_val: !input saturation_step_fast
  fan_step_slow_val: !input fan_step_slow
  fan_step_medium_val: !input fan_step_medium
  fan_step_fast_val: !input fan_step_fast
  kelvin_step_slow_val: !input color_temp_kelvin_step_slow
  kelvin_step_medium_val: !input color_temp_kelvin_step_medium
  kelvin_step_fast_val: !input color_temp_kelvin_step_fast
  reverse_rotation_val: !input reverse_rotation
  transition_time_val: !input transition_time
  timeout_seconds_value: !input timeout_seconds

trigger:
  - id: encoder
    platform: state
    entity_id: !input encoder_speed_entity

  - id: button_single
    platform: state
    entity_id: !input button_single
    from: "off"
    to: "on"

  - id: button_double
    platform: state
    entity_id: !input button_double
    from: "off"
    to: "on"

  - id: button_long
    platform: state
    entity_id: !input button_long
    from: "off"
    to: "on"

  - id: button_fan_toggle
    platform: state
    entity_id: !input button_fan
    from: "off"
    to: "on"

  - id: timer_finished
    platform: state
    entity_id: !input exit_timer_entity
    from: "active"
    to: "idle"

action:
  - choose:

      - conditions:
          - condition: trigger
            id: timer_finished
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input mode_select_entity
            data:
              option: normal
          - service: input_select.select_option
            target:
              entity_id: !input hue_submode_entity
            data:
              option: saturation
          - if:
              - condition: template
                value_template: "{{ feedback_light != [] }}"
            then:
              - service: light.turn_off
                target:
                  entity_id: !input feedback_light_entity

      - conditions:
          - condition: trigger
            id: button_single
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(hue_submode) == 'saturation' }}"
                        sequence:
                          - service: input_select.select_option
                            target:
                              entity_id: !input hue_submode_entity
                            data:
                              option: hue
                    default:
                      - service: input_select.select_option
                        target:
                          entity_id: !input hue_submode_entity
                        data:
                          option: saturation
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"
            default:
              - service: light.toggle
                target:
                  entity_id: !input light_entity

      - conditions:
          - condition: trigger
            id: button_fan_toggle
          - condition: template
            value_template: "{{ button_fan_entities | length > 0 }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'fan' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: fan
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _fan_pct: "{{ state_attr(fan, 'percentage') | default(0) | int }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ _fan_pct <= 1 }}"
                        sequence:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color: [255, 0, 0]
                      - conditions:
                          - condition: template
                            value_template: "{{ _fan_pct >= 67 }}"
                        sequence:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color: [0, 255, 0]
                    default:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          rgb_color: [255, 255, 0]

      - conditions:
          - condition: trigger
            id: button_double
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ button_fan_entities | length > 0 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(mode_select) == 'hue' }}"
                        sequence:
                          - service: input_select.select_option
                            target:
                              entity_id: !input mode_select_entity
                            data:
                              option: normal
                          - service: input_select.select_option
                            target:
                              entity_id: !input hue_submode_entity
                            data:
                              option: saturation
                          - service: timer.cancel
                            target:
                              entity_id: !input exit_timer_entity
                          - if:
                              - condition: template
                                value_template: "{{ feedback_light != [] }}"
                            then:
                              - service: light.turn_off
                                target:
                                  entity_id: !input feedback_light_entity
                      - conditions:
                          - condition: template
                            value_template: "{{ states(mode_select) == 'fan' }}"
                        sequence:
                          - service: input_select.select_option
                            target:
                              entity_id: !input mode_select_entity
                            data:
                              option: normal
                          - service: timer.cancel
                            target:
                              entity_id: !input exit_timer_entity
                          - if:
                              - condition: template
                                value_template: "{{ feedback_light != [] }}"
                            then:
                              - service: light.turn_off
                                target:
                                  entity_id: !input feedback_light_entity
                    default:
                      - service: input_select.select_option
                        target:
                          entity_id: !input mode_select_entity
                        data:
                          option: hue
                      - service: input_select.select_option
                        target:
                          entity_id: !input hue_submode_entity
                        data:
                          option: saturation
                      - service: timer.start
                        target:
                          entity_id: !input exit_timer_entity
                        data:
                          duration: "{{ timeout_seconds_value }}"
                      - if:
                          - condition: template
                            value_template: "{{ feedback_light != [] }}"
                        then:
                          - variables:
                              _hs: "{{ state_attr(light, 'hs_color') }}"
                              _h: "{{ (_hs[0] if _hs else 0) | float }}"
                              _s: "{{ ((_hs[1] if _hs else 100) / 100) | float }}"
                              _c: "{{ _s }}"
                              _x: "{{ _c * (1 - ((_h / 60) % 2 - 1) | abs) }}"
                              _m: "{{ 1.0 - _c }}"
                              _i: "{{ (_h | int) // 60 }}"
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color:
                                - "{{ (([_c, _x, 0, 0, _x, _c][_i | int] + _m) * 255) | int }}"
                                - "{{ (([_x, _c, _c, _x, 0, 0][_i | int] + _m) * 255) | int }}"
                                - "{{ (([0, 0, _x, _c, _c, _x][_i | int] + _m) * 255) | int }}"
            default:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ states(mode_select) == 'fan' }}"
                    sequence:
                      - service: input_select.select_option
                        target:
                          entity_id: !input mode_select_entity
                        data:
                          option: normal
                      - service: timer.cancel
                        target:
                          entity_id: !input exit_timer_entity
                      - if:
                          - condition: template
                            value_template: "{{ feedback_light != [] }}"
                        then:
                          - service: light.turn_off
                            target:
                              entity_id: !input feedback_light_entity
                default:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: fan
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - variables:
                          _fan_pct: "{{ state_attr(fan, 'percentage') | default(0) | int }}"
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ _fan_pct <= 1 }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color: [255, 0, 0]
                          - conditions:
                              - condition: template
                                value_template: "{{ _fan_pct >= 67 }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color: [0, 255, 0]
                        default:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color: [255, 255, 0]

      - conditions:
          - condition: trigger
            id: button_long
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: color_temp
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _min_k: >-
                        {% set k = state_attr(light, 'min_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'max_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'max_mireds') | float)) | round(0) | int }}
                        {% else %}
                          2000
                        {% endif %}
                      _max_k: >-
                        {% set k = state_attr(light, 'max_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'min_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'min_mireds') | float)) | round(0) | int }}
                        {% else %}
                          6500
                        {% endif %}
                      _cur_k: >-
                        {% set k = state_attr(light, 'color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'color_temp') is not none and state_attr(light, 'color_temp') | float(0) > 0 %}
                          {{ (1000000 / (state_attr(light, 'color_temp') | float)) | round(0) | int }}
                        {% else %}
                          {{ (((_min_k | float) + (_max_k | float)) / 2) | round(0) | int }}
                        {% endif %}
                      _span: "{{ [((_max_k | float) - (_min_k | float)), 1] | max }}"
                      _t: "{{ [[(((_cur_k | float) - (_min_k | float)) / (_span | float)), 0] | max, 1] | min }}"
                      _r: "{{ (200 + 55 * (1 - (_t | float))) | int }}"
                      _g: "{{ (220 - 73 * (1 - (_t | float))) | int }}"
                      _b: "{{ (255 - 214 * (1 - (_t | float))) | int }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input feedback_light_entity
                    data:
                      brightness_pct: 85
                      rgb_color:
                        - "{{ _r }}"
                        - "{{ _g }}"
                        - "{{ _b }}"

      - conditions:
          - condition: trigger
            id: encoder
          - condition: template
            value_template: >-
              {{ trigger.to_state.state | float(none) is not none
                 and trigger.to_state.state != 'unavailable'
                 and trigger.to_state.state != 'unknown' }}
        sequence:
          - variables:
              speed_val: "{{ trigger.to_state.state | float(0) }}"
              abs_speed: "{{ speed_val | abs }}"
              direction: "{{ (1 if reverse_rotation_val else -1) if speed_val >= 0 else (-1 if reverse_rotation_val else 1) }}"
              brightness_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ brightness_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ brightness_step_medium_val }}
                {% else %}
                  {{ brightness_step_slow_val }}
                {% endif %}
              hue_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ hue_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ hue_step_medium_val }}
                {% else %}
                  {{ hue_step_slow_val }}
                {% endif %}
              saturation_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ saturation_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ saturation_step_medium_val }}
                {% else %}
                  {{ saturation_step_slow_val }}
                {% endif %}
              fan_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ fan_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ fan_step_medium_val }}
                {% else %}
                  {{ fan_step_slow_val }}
                {% endif %}
              kelvin_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ kelvin_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ kelvin_step_medium_val }}
                {% else %}
                  {{ kelvin_step_slow_val }}
                {% endif %}
          - choose:

              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'normal' }}"
                sequence:
                  - variables:
                      current_pct: >-
                        {{ ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0) }}
                      new_pct: >-
                        {{ [1, [(current_pct | int) + (direction | int) * (brightness_step | int), 100] | min] | max }}
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      brightness_pct: "{{ new_pct }}"
                      transition: "{{ transition_time_val / 1000 }}"

              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'hue' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ states(hue_submode) == 'saturation' }}"
                        sequence:
                          - variables:
                              _hs: "{{ state_attr(light, 'hs_color') }}"
                              _cur_h: "{{ (_hs[0] if _hs else 0) | float }}"
                              _cur_s: "{{ (_hs[1] if _hs else 0) | float }}"
                              _new_s: "{{ [0, [(_cur_s | float) + (direction | int) * (saturation_step | int), 100] | min] | max }}"
                              _s_: "{{ (_new_s / 100) | float }}"
                              _c_: "{{ _s_ }}"
                              _x_: "{{ _c_ * (1 - ((_cur_h / 60) % 2 - 1) | abs) }}"
                              _m_: "{{ 1.0 - _c_ }}"
                              _i_: "{{ (_cur_h | int) // 60 }}"
                          - service: light.turn_on
                            target:
                              entity_id: !input light_entity
                            data:
                              hs_color:
                                - "{{ _cur_h }}"
                                - "{{ _new_s }}"
                              transition: "{{ transition_time_val / 1000 }}"
                          - if:
                              - condition: template
                                value_template: "{{ feedback_light != [] }}"
                            then:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color:
                                    - "{{ (([_c_, _x_, 0, 0, _x_, _c_][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([_x_, _c_, _c_, _x_, 0, 0][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([0, 0, _x_, _c_, _c_, _x_][_i_ | int] + _m_) * 255) | int }}"
                          - service: timer.start
                            target:
                              entity_id: !input exit_timer_entity
                            data:
                              duration: "{{ timeout_seconds_value }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ states(hue_submode) == 'hue' }}"
                        sequence:
                          - variables:
                              _hs: "{{ state_attr(light, 'hs_color') }}"
                              _cur_h: "{{ (_hs[0] if _hs else 0) | float }}"
                              _cur_s: "{{ (_hs[1] if _hs else 100) | float }}"
                              _new_h: "{{ (_cur_h + (direction | int) * (hue_step | int)) % 360 }}"
                              _s_: "{{ (_cur_s / 100) | float }}"
                              _c_: "{{ _s_ }}"
                              _x_: "{{ _c_ * (1 - ((_new_h / 60) % 2 - 1) | abs) }}"
                              _m_: "{{ 1.0 - _c_ }}"
                              _i_: "{{ (_new_h | int) // 60 }}"
                          - service: light.turn_on
                            target:
                              entity_id: !input light_entity
                            data:
                              hs_color:
                                - "{{ _new_h }}"
                                - "{{ _cur_s }}"
                              transition: "{{ transition_time_val / 1000 }}"
                          - if:
                              - condition: template
                                value_template: "{{ feedback_light != [] }}"
                            then:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color:
                                    - "{{ (([_c_, _x_, 0, 0, _x_, _c_][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([_x_, _c_, _c_, _x_, 0, 0][_i_ | int] + _m_) * 255) | int }}"
                                    - "{{ (([0, 0, _x_, _c_, _c_, _x_][_i_ | int] + _m_) * 255) | int }}"
                          - service: timer.start
                            target:
                              entity_id: !input exit_timer_entity
                            data:
                              duration: "{{ timeout_seconds_value }}"

              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'fan' }}"
                sequence:
                  - variables:
                      cur_fan_pct: "{{ state_attr(fan, 'percentage') | default(0) | int }}"
                      new_fan_pct: >-
                        {{ [0, [(cur_fan_pct | int) + (direction | int) * (fan_step | int), 100] | min] | max }}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ new_fan_pct <= 0 }}"
                        sequence:
                          - service: fan.turn_off
                            target:
                              entity_id: !input fan_entity
                    default:
                      - service: fan.turn_on
                        target:
                          entity_id: !input fan_entity
                        data:
                          percentage: "{{ new_fan_pct }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ new_fan_pct <= 1 }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color: [255, 0, 0]
                          - conditions:
                              - condition: template
                                value_template: "{{ new_fan_pct >= 67 }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color: [0, 255, 0]
                        default:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color: [255, 255, 0]
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - variables:
                      _min_k: >-
                        {% set k = state_attr(light, 'min_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'max_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'max_mireds') | float)) | round(0) | int }}
                        {% else %}
                          2000
                        {% endif %}
                      _max_k: >-
                        {% set k = state_attr(light, 'max_color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'min_mireds') is not none %}
                          {{ (1000000 / (state_attr(light, 'min_mireds') | float)) | round(0) | int }}
                        {% else %}
                          6500
                        {% endif %}
                      _cur_k: >-
                        {% set k = state_attr(light, 'color_temp_kelvin') %}
                        {% if k is not none and k | float(0) > 0 %}
                          {{ k | int }}
                        {% elif state_attr(light, 'color_temp') is not none and state_attr(light, 'color_temp') | float(0) > 0 %}
                          {{ (1000000 / (state_attr(light, 'color_temp') | float)) | round(0) | int }}
                        {% else %}
                          {{ (((_min_k | float) + (_max_k | float)) / 2) | round(0) | int }}
                        {% endif %}
                      _new_k: "{{ [_min_k | int, [_max_k | int, (_cur_k | int) - (direction | int) * (kelvin_step | int)] | min] | max }}"
                      _span: "{{ [((_max_k | float) - (_min_k | float)), 1] | max }}"
                      _t: "{{ [[(((_new_k | float) - (_min_k | float)) / (_span | float)), 0] | max, 1] | min }}"
                      _r: "{{ (200 + 55 * (1 - (_t | float))) | int }}"
                      _g: "{{ (220 - 73 * (1 - (_t | float))) | int }}"
                      _b: "{{ (255 - 214 * (1 - (_t | float))) | int }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      color_temp_kelvin: "{{ _new_k }}"
                      transition: "{{ transition_time_val / 1000 }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          brightness_pct: 85
                          rgb_color:
                            - "{{ _r }}"
                            - "{{ _g }}"
                            - "{{ _b }}"
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

mode: restart
