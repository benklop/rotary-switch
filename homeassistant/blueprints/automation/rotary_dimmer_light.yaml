blueprint:
  name: Rotary Encoder Simple Light (Degrees)
  description: >
    Simple rotary encoder dimmer using ESPHome degree-based sensor and
    explicit single/double/long button binary sensors.
    - Single press: toggle light
    - Rotate: adjust brightness based on delta degrees
    - Double/long press: optional extra actions (off by default)
  domain: automation

  input:
    light_entity:
      name: Light
      description: Light to control
      selector:
        entity:
          domain: light

    delta_degrees_sensor:
      name: Encoder delta degrees sensor
      description: ESPHome sensor that reports signed delta in degrees (e.g. encoder_delta_degrees)
      selector:
        entity:
          domain: sensor

    button_single:
      name: Single-press button binary sensor
      description: ESPHome binary sensor that pulses on for a single press (e.g. encoder_button_single)
      selector:
        entity:
          domain: binary_sensor

    button_double:
      name: Double-press button binary sensor (optional)
      description: ESPHome binary sensor that pulses on for a double press (e.g. encoder_button_double)
      default: []
      selector:
        entity:
          domain: binary_sensor

    button_long:
      name: Long-press button binary sensor (optional)
      description: ESPHome binary sensor that pulses on for a long press (e.g. encoder_button_long)
      default: []
      selector:
        entity:
          domain: binary_sensor

    brightness_per_45deg:
      name: Brightness change per 45°
      description: How many % brightness to change for a 45° turn.
      default: 5
      selector:
        number:
          min: 1
          max: 25
          step: 1
          unit_of_measurement: "%"

    min_delta_degrees:
      name: Ignore tiny movements below this delta (°)
      description: Movements smaller than this absolute delta are ignored.
      default: 1.0
      selector:
        number:
          min: 0.0
          max: 10.0
          step: 0.5

variables:
  light: !input light_entity
  delta_sensor: !input delta_degrees_sensor
  brightness_per_45deg_value: !input brightness_per_45deg
  min_delta_degrees_value: !input min_delta_degrees

trigger:
  - id: rotation
    platform: state
    entity_id: !input delta_degrees_sensor

  - id: button_single
    platform: state
    entity_id: !input button_single
    from: "off"
    to: "on"

  - id: button_double
    platform: state
    entity_id: !input button_double
    from: "off"
    to: "on"
    enabled: false

  - id: button_long
    platform: state
    entity_id: !input button_long
    from: "off"
    to: "on"
    enabled: false

action:
  - choose:
      # Single press: toggle light
      - conditions:
          - condition: trigger
            id: button_single
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_entity

      # Double press (optional): turn light to full brightness
      - conditions:
          - condition: trigger
            id: button_double
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: 100

      # Long press (optional): turn light off
      - conditions:
          - condition: trigger
            id: button_long
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input light_entity

      # Rotation: adjust brightness based on delta degrees
      - conditions:
          - condition: trigger
            id: rotation
        sequence:
          - variables:
              delta: "{{ trigger.to_state.state | float(0) }}"
          - condition: template
            value_template: "{{ delta | abs >= min_delta_degrees_value }}"
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: >-
                {# Current brightness in %, default 0 if unknown #}
                {% set current_pct =
                   ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0)
                %}
                {# Step is proportional to delta degrees; 45° == brightness_per_45deg % #}
                {% set step =
                   (delta / 45.0 * brightness_per_45deg_value) | round(0)
                %}
                {% set result = (current_pct + step) | round(0) %}
                {{ [0, [result, 100] | min] | max }}

mode: restart
