blueprint:
  name: Rotary Encoder Simple Light (CW/CCW)
  description: >
    Simple rotary encoder dimmer using ESPHome CW/CCW binary sensors.
    - Single press: toggle light
    - CW: increase brightness | CCW: decrease brightness
    - Double/long press: optional extra actions (off by default)
  domain: automation

  input:
    light_entity:
      name: Light
      description: Light to control
      selector:
        entity:
          domain: light

    encoder_cw:
      name: Encoder CW binary sensor
      description: ESPHome binary sensor that pulses on clockwise turn (e.g. Encoder CW)
      selector:
        entity:
          domain: binary_sensor

    encoder_ccw:
      name: Encoder CCW binary sensor
      description: ESPHome binary sensor that pulses on counterclockwise turn (e.g. Encoder CCW)
      selector:
        entity:
          domain: binary_sensor

    button_single:
      name: Single-press button binary sensor
      description: ESPHome binary sensor that pulses on a single press (e.g. Button Single)
      selector:
        entity:
          domain: binary_sensor

    button_double:
      name: Double-press button binary sensor (optional)
      description: ESPHome binary sensor that pulses on a double press (e.g. Button Double)
      default: []
      selector:
        entity:
          domain: binary_sensor

    button_long:
      name: Long-press button binary sensor (optional)
      description: ESPHome binary sensor that pulses on a long press (e.g. Button Long)
      default: []
      selector:
        entity:
          domain: binary_sensor

    brightness_step:
      name: Brightness step per detent
      description: How many % to add (CW) or subtract (CCW) per encoder step.
      default: 5
      selector:
        number:
          min: 1
          max: 25
          step: 1
          unit_of_measurement: "%"

variables:
  light: !input light_entity
  brightness_step_value: !input brightness_step

trigger:
  - id: cw
    platform: state
    entity_id: !input encoder_cw
    from: "off"
    to: "on"

  - id: ccw
    platform: state
    entity_id: !input encoder_ccw
    from: "off"
    to: "on"

  - id: button_single
    platform: state
    entity_id: !input button_single
    from: "off"
    to: "on"

  - id: button_double
    platform: state
    entity_id: !input button_double
    from: "off"
    to: "on"
    enabled: false

  - id: button_long
    platform: state
    entity_id: !input button_long
    from: "off"
    to: "on"
    enabled: false

action:
  - choose:
      # Single press: toggle light
      - conditions:
          - condition: trigger
            id: button_single
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_entity

      # Double press (optional): turn light to full brightness
      - conditions:
          - condition: trigger
            id: button_double
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: 100

      # Long press (optional): turn light off
      - conditions:
          - condition: trigger
            id: button_long
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input light_entity

      # CW: increase brightness
      - conditions:
          - condition: trigger
            id: cw
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: >-
                {% set current_pct =
                   ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0)
                %}
                {% set result = (current_pct + brightness_step_value) | round(0) %}
                {{ [0, [result, 100] | min] | max }}

      # CCW: decrease brightness
      - conditions:
          - condition: trigger
            id: ccw
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: >-
                {% set current_pct =
                   ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0)
                %}
                {% set result = (current_pct - brightness_step_value) | round(0) %}
                {{ [0, [result, 100] | min] | max }}

mode: restart
