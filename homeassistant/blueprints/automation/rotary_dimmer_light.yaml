blueprint:
  name: Rotary Encoder Speed-Sensitive Dimmer
  description: >
    Controls a dimmable light with the rotary encoder. Brightness step size
    scales automatically with how fast you spin — measured on the ESP32 itself
    (1 ms resolution) so speed classification is clean and jitter-free.

    Requires the updated rotary-lightswitch ESPHome firmware which publishes
    an "Encoder Speed" sensor (det/s, signed: + = CW, − = CCW).

    Behavior:
      - Single press:  toggle light on/off
      - Slow turn:     small brightness step  (default 3 %)
      - Medium turn:   medium brightness step (default 10 %)
      - Fast turn:     large brightness step  (default 25 %)

    No input_number helper required — timing is done on the device.
  domain: automation

  input:
    light_entity:
      name: Light
      description: The dimmable light to control.
      selector:
        entity:
          domain: light

    rotary_device:
      name: Rotary Knob Device
      description: >-
        The ESPHome device for your rotary knob. Selecting it here narrows the
        two dropdowns below to only show entities from that device.
      selector:
        device:
          integration: esphome

    encoder_speed_entity:
      name: Encoder Speed sensor
      description: >-
        The "Encoder Speed" sensor (det/s) from the rotary knob device. After
        selecting the device above, only its sensors will appear here.
      selector:
        entity:
          filter:
            - device_id: !input rotary_device
              domain: sensor

    button_single:
      name: Single-press binary sensor
      description: >-
        The "Button Single" binary sensor from the rotary knob device. After
        selecting the device above, only its binary sensors will appear here.
      selector:
        entity:
          filter:
            - device_id: !input rotary_device
              domain: binary_sensor

    # ── Speed thresholds ────────────────────────────────────────────────────
    slow_threshold:
      name: Slow / medium threshold (det/s)
      description: >
        Turns slower than this are "slow". Typical deliberate single-detent
        turn is around 1–3 det/s; a comfortable sweep is 5–10 det/s.
      default: 3.0
      selector:
        number:
          min: 0.5
          max: 10.0
          step: 0.5
          unit_of_measurement: "det/s"

    fast_threshold:
      name: Medium / fast threshold (det/s)
      description: Turns faster than this are "fast".
      default: 8.0
      selector:
        number:
          min: 2.0
          max: 25.0
          step: 0.5
          unit_of_measurement: "det/s"

    # ── Step sizes ──────────────────────────────────────────────────────────
    step_slow:
      name: Slow step (% per detent)
      description: Brightness change per detent for a slow, deliberate turn.
      default: 3
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "%"

    step_medium:
      name: Medium step (% per detent)
      description: Brightness change per detent at a comfortable sweep speed.
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "%"

    step_fast:
      name: Fast step (% per detent)
      description: Brightness change per detent when spinning quickly.
      default: 25
      selector:
        number:
          min: 5
          max: 50
          step: 1
          unit_of_measurement: "%"

    # ── Rotation direction ────────────────────────────────────────────────────
    reverse_rotation:
      name: Reverse rotation direction
      description: >-
        Check to swap the increase/decrease direction. Use this if your encoder
        is wired so that clockwise turns decrease brightness instead of increasing.
      default: false
      selector:
        boolean:

    # ── Transition time ─────────────────────────────────────────────────────
    transition_time:
      name: Transition time (ms)
      description: >
        How long the light takes to reach the new brightness level. Shorter
        values feel snappier; longer values smooth out rapid successive steps.
        50–250 ms is a good starting point.
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: ms

variables:
  light: !input light_entity
  encoder_speed_entity: !input encoder_speed_entity
  slow_threshold_val: !input slow_threshold
  fast_threshold_val: !input fast_threshold
  step_slow_val: !input step_slow
  step_medium_val: !input step_medium
  step_fast_val: !input step_fast
  transition_time_val: !input transition_time
  reverse_rotation_val: !input reverse_rotation

trigger:
  # Every detent (CW or CCW) publishes a new speed value
  - id: encoder
    platform: state
    entity_id: !input encoder_speed_entity

  - id: single
    platform: state
    entity_id: !input button_single
    from: "off"
    to: "on"

action:
  - choose:

      # ── Toggle on single press ────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: single
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_entity

      # ── Brightness adjustment on encoder turn ─────────────────────────────
      - conditions:
          - condition: trigger
            id: encoder
          # Ignore the unavailable / non-numeric states that can appear briefly
          - condition: template
            value_template: >-
              {{ trigger.to_state.state | float(none) is not none
                 and trigger.to_state.state != 'unavailable'
                 and trigger.to_state.state != 'unknown' }}
        sequence:
          - variables:
              speed_val: "{{ trigger.to_state.state | float(0) }}"
              abs_speed: "{{ speed_val | abs }}"
              # −1 for CW (increase), +1 for CCW (decrease); reversed by checkbox
              direction: "{{ (1 if reverse_rotation_val else -1) if speed_val >= 0 else (-1 if reverse_rotation_val else 1) }}"
              step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ step_medium_val }}
                {% else %}
                  {{ step_slow_val }}
                {% endif %}
              current_pct: >-
                {{ ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0) }}
              new_pct: >-
                {{ [1, [(current_pct | int) + (direction | int) * (step | int), 100] | min] | max }}
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: "{{ new_pct }}"
              transition: "{{ transition_time_val / 1000 }}"

mode: restart
