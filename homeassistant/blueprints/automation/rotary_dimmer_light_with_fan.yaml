blueprint:
  name: Rotary Encoder Speed-Sensitive Dimmer Light + Fan
  description: >
    Controls a dimmable light and a fan with a rotary encoder.
    Rotation speed is measured on the ESP32 and mapped to slow/medium/fast
    step sizes for brightness, fan percentage, and color temperature.

    Requires the updated rotary-lightswitch ESPHome firmware which publishes
    an "Encoder Speed" sensor (det/s, signed: + = CW, - = CCW).

    Behavior:
      - Single press: toggle light on/off
      - Rotate in normal mode: change brightness (speed-sensitive)
      - Double press: toggle fan mode; rotate to change fan speed
      - Long press: toggle color temperature mode; rotate to change CT
      - Fan/CT mode auto-exit after inactivity timeout (reset on each rotation)

    Optional feedback light:
      - normal mode: off
      - fan mode: red (off), yellow (low/medium), green (high)
      - color_temp mode: cool blue-white <-> warm amber
  domain: automation

  input:
    light_entity:
      name: Light
      description: The dimmable light to control.
      selector:
        entity:
          domain: light

    fan_entity:
      name: Fan
      description: Fan to control in fan mode (percentage based).
      selector:
        entity:
          domain: fan

    feedback_light_entity:
      name: Feedback light (optional)
      description: >
        Light used for mode feedback (e.g. knob LED).
        Off in normal mode; red/yellow/green in fan mode;
        cool-to-warm indication in CT mode.
        Leave empty to disable feedback.
      default: []
      selector:
        entity:
          domain: light

    encoder_speed_entity:
      name: Encoder Speed sensor
      description: >
        The "Encoder Speed" sensor from the ESPHome device. Publishes a signed
        float (det/s) on every detent: positive = clockwise, negative = CCW.
      selector:
        entity:
          domain: sensor

    button_single:
      name: Single-press binary sensor
      description: Pulses ON briefly on a single press.
      selector:
        entity:
          domain: binary_sensor

    button_double:
      name: Double-press binary sensor
      description: Pulses ON briefly on double press. Toggles fan mode.
      selector:
        entity:
          domain: binary_sensor

    button_long:
      name: Long-press binary sensor
      description: Pulses ON briefly on long press. Toggles color temperature mode.
      selector:
        entity:
          domain: binary_sensor

    mode_select_entity:
      name: Mode helper (input_select)
      description: >
        Create an input_select with exactly these options (in this order):
        normal, fan, color_temp
      selector:
        entity:
          domain: input_select

    exit_timer_entity:
      name: Exit timer
      description: >
        Timer that auto-exits fan/CT mode after inactivity.
        Each encoder rotation while in fan/CT mode resets it.
      selector:
        entity:
          domain: timer

    slow_threshold:
      name: Slow / medium threshold (det/s)
      description: Turns slower than this are classified as slow.
      default: 3.0
      selector:
        number:
          min: 0.5
          max: 10.0
          step: 0.5
          unit_of_measurement: "det/s"

    fast_threshold:
      name: Medium / fast threshold (det/s)
      description: Turns faster than this are classified as fast.
      default: 8.0
      selector:
        number:
          min: 2.0
          max: 25.0
          step: 0.5
          unit_of_measurement: "det/s"

    brightness_step_slow:
      name: Brightness slow step (% per detent)
      default: 3
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "%"

    brightness_step_medium:
      name: Brightness medium step (% per detent)
      default: 10
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "%"

    brightness_step_fast:
      name: Brightness fast step (% per detent)
      default: 25
      selector:
        number:
          min: 5
          max: 50
          step: 1
          unit_of_measurement: "%"

    fan_step_slow:
      name: Fan slow step (% per detent)
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "%"

    fan_step_medium:
      name: Fan medium step (% per detent)
      default: 15
      selector:
        number:
          min: 1
          max: 40
          step: 1
          unit_of_measurement: "%"

    fan_step_fast:
      name: Fan fast step (% per detent)
      default: 30
      selector:
        number:
          min: 5
          max: 60
          step: 1
          unit_of_measurement: "%"

    mired_step_slow:
      name: Color temp slow step (mireds)
      default: 10
      selector:
        number:
          min: 5
          max: 50
          step: 5

    mired_step_medium:
      name: Color temp medium step (mireds)
      default: 20
      selector:
        number:
          min: 5
          max: 75
          step: 5

    mired_step_fast:
      name: Color temp fast step (mireds)
      default: 35
      selector:
        number:
          min: 10
          max: 100
          step: 5

    timeout_seconds:
      name: Fan / CT mode timeout (seconds)
      description: Return to normal mode after this many inactive seconds.
      default: 30
      selector:
        number:
          min: 10
          max: 120
          step: 5
          unit_of_measurement: s

    reverse_rotation:
      name: Reverse rotation direction
      description: >-
        Check to swap increase/decrease direction. Use this if your encoder is
        wired so clockwise turns decrease values.
      default: false
      selector:
        boolean:

    transition_time:
      name: Light transition time (ms)
      description: Transition for brightness and color temperature changes.
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: ms

variables:
  light: !input light_entity
  fan: !input fan_entity
  feedback_light: !input feedback_light_entity
  mode_select: !input mode_select_entity
  slow_threshold_val: !input slow_threshold
  fast_threshold_val: !input fast_threshold
  brightness_step_slow_val: !input brightness_step_slow
  brightness_step_medium_val: !input brightness_step_medium
  brightness_step_fast_val: !input brightness_step_fast
  fan_step_slow_val: !input fan_step_slow
  fan_step_medium_val: !input fan_step_medium
  fan_step_fast_val: !input fan_step_fast
  mired_step_slow_val: !input mired_step_slow
  mired_step_medium_val: !input mired_step_medium
  mired_step_fast_val: !input mired_step_fast
  timeout_seconds_value: !input timeout_seconds
  reverse_rotation_val: !input reverse_rotation
  transition_time_val: !input transition_time

trigger:
  - id: encoder
    platform: state
    entity_id: !input encoder_speed_entity

  - id: button_single
    platform: state
    entity_id: !input button_single
    from: "off"
    to: "on"

  - id: button_double
    platform: state
    entity_id: !input button_double
    from: "off"
    to: "on"

  - id: button_long
    platform: state
    entity_id: !input button_long
    from: "off"
    to: "on"

  - id: timer_finished
    platform: state
    entity_id: !input exit_timer_entity
    from: "active"
    to: "idle"

action:
  - choose:

      - conditions:
          - condition: trigger
            id: timer_finished
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input mode_select_entity
            data:
              option: normal
          - if:
              - condition: template
                value_template: "{{ feedback_light != [] }}"
            then:
              - service: light.turn_off
                target:
                  entity_id: !input feedback_light_entity

      - conditions:
          - condition: trigger
            id: button_single
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_entity

      - conditions:
          - condition: trigger
            id: button_double
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'fan' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: fan
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _fan_pct: "{{ state_attr(fan, 'percentage') | default(0) | int }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ _fan_pct <= 1 }}"
                        sequence:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color: [255, 0, 0]
                      - conditions:
                          - condition: template
                            value_template: "{{ _fan_pct >= 67 }}"
                        sequence:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color: [0, 255, 0]
                    default:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          rgb_color: [255, 255, 0]

      - conditions:
          - condition: trigger
            id: button_long
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - service: input_select.select_option
                    target:
                      entity_id: !input mode_select_entity
                    data:
                      option: normal
                  - service: timer.cancel
                    target:
                      entity_id: !input exit_timer_entity
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_off
                        target:
                          entity_id: !input feedback_light_entity
            default:
              - service: input_select.select_option
                target:
                  entity_id: !input mode_select_entity
                data:
                  option: color_temp
              - service: timer.start
                target:
                  entity_id: !input exit_timer_entity
                data:
                  duration: "{{ timeout_seconds_value }}"
              - if:
                  - condition: template
                    value_template: "{{ feedback_light != [] }}"
                then:
                  - variables:
                      _min_m: "{{ state_attr(light, 'min_mireds') | default(153) | int }}"
                      _max_m: "{{ state_attr(light, 'max_mireds') | default(500) | int }}"
                      _cur_m: "{{ state_attr(light, 'color_temp') | default(300) | int }}"
                      _den: "{{ [_max_m - _min_m, 1] | max }}"
                      _t: "{{ [[(_cur_m - _min_m) / _den, 0] | max, 1] | min }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input feedback_light_entity
                    data:
                      rgb_color:
                        - "{{ (200 + 55 * _t) | int }}"
                        - "{{ (220 - 73 * _t) | int }}"
                        - "{{ (255 - 214 * _t) | int }}"

      - conditions:
          - condition: trigger
            id: encoder
          - condition: template
            value_template: >-
              {{ trigger.to_state.state | float(none) is not none
                 and trigger.to_state.state != 'unavailable'
                 and trigger.to_state.state != 'unknown' }}
        sequence:
          - variables:
              speed_val: "{{ trigger.to_state.state | float(0) }}"
              abs_speed: "{{ speed_val | abs }}"
              direction: "{{ (1 if reverse_rotation_val else -1) if speed_val >= 0 else (-1 if reverse_rotation_val else 1) }}"
              brightness_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ brightness_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ brightness_step_medium_val }}
                {% else %}
                  {{ brightness_step_slow_val }}
                {% endif %}
              fan_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ fan_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ fan_step_medium_val }}
                {% else %}
                  {{ fan_step_slow_val }}
                {% endif %}
              mired_step: >-
                {% if abs_speed >= fast_threshold_val %}
                  {{ mired_step_fast_val }}
                {% elif abs_speed >= slow_threshold_val %}
                  {{ mired_step_medium_val }}
                {% else %}
                  {{ mired_step_slow_val }}
                {% endif %}
          - choose:

              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'normal' }}"
                sequence:
                  - variables:
                      current_pct: >-
                        {{ ((state_attr(light, 'brightness') | default(0) | int) / 2.55) | round(0) }}
                      new_pct: >-
                        {{ [1, [(current_pct | int) + (direction | int) * (brightness_step | int), 100] | min] | max }}
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      brightness_pct: "{{ new_pct }}"
                      transition: "{{ transition_time_val / 1000 }}"

              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'fan' }}"
                sequence:
                  - variables:
                      cur_fan_pct: "{{ state_attr(fan, 'percentage') | default(0) | int }}"
                      new_fan_pct: >-
                        {{ [0, [(cur_fan_pct | int) + (direction | int) * (fan_step | int), 100] | min] | max }}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ new_fan_pct <= 0 }}"
                        sequence:
                          - service: fan.turn_off
                            target:
                              entity_id: !input fan_entity
                    default:
                      - service: fan.turn_on
                        target:
                          entity_id: !input fan_entity
                        data:
                          percentage: "{{ new_fan_pct }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ new_fan_pct <= 1 }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color: [255, 0, 0]
                          - conditions:
                              - condition: template
                                value_template: "{{ new_fan_pct >= 67 }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input feedback_light_entity
                                data:
                                  rgb_color: [0, 255, 0]
                        default:
                          - service: light.turn_on
                            target:
                              entity_id: !input feedback_light_entity
                            data:
                              rgb_color: [255, 255, 0]
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

              - conditions:
                  - condition: template
                    value_template: "{{ states(mode_select) == 'color_temp' }}"
                sequence:
                  - variables:
                      min_m: "{{ state_attr(light, 'min_mireds') | default(153) | int }}"
                      max_m: "{{ state_attr(light, 'max_mireds') | default(500) | int }}"
                      cur_m: "{{ state_attr(light, 'color_temp') | default(300) | int }}"
                      new_m: "{{ [min_m, [max_m, (cur_m | int) + (direction | int) * (mired_step | int)] | min] | max }}"
                      den: "{{ [max_m - min_m, 1] | max }}"
                      t: "{{ [[(new_m - min_m) / den, 0] | max, 1] | min }}"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
                    data:
                      color_temp: "{{ new_m }}"
                      transition: "{{ transition_time_val / 1000 }}"
                  - if:
                      - condition: template
                        value_template: "{{ feedback_light != [] }}"
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input feedback_light_entity
                        data:
                          rgb_color:
                            - "{{ (200 + 55 * t) | int }}"
                            - "{{ (220 - 73 * t) | int }}"
                            - "{{ (255 - 214 * t) | int }}"
                  - service: timer.start
                    target:
                      entity_id: !input exit_timer_entity
                    data:
                      duration: "{{ timeout_seconds_value }}"

mode: restart
