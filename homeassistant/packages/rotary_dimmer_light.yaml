# Helper package for the speed-sensitive Light + Fan blueprint:
# homeassistant/blueprints/automation/rotary_dimmer_rgb_with_fan.yaml
#
# This package only defines helpers. Create the automation itself from the blueprint UI.

rotary_dimmer_rgb_with_fan:
  input_select:
    rotary_switch_mode:
      name: Rotary Switch Mode
      options:
        - normal
        - fan
        - color_temp
      initial: normal

  timer:
    rotary_switch_mode_exit:
      name: Rotary Switch Mode Exit
      duration: "00:00:30"
