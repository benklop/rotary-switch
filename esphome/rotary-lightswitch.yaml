# Rotary Light Switch - ESPHome configuration for ESP32-S2 Mini (Lolin S2 Mini)
# EC11 rotary encoder (ENC_A, ENC_B, ENC_BTN) + RGB LED behind knob
# Board: lolin_s2_mini. Upload: hold GPIO0, press RST to enter flash mode.
# Wiring: ENC_A=GPIO34, ENC_B=GPIO36, ENC_BTN=GPIO37; RGB R=GPIO4, G=GPIO5, B=GPIO6
#         (470 Ω on R, 430 Ω on G and B, between each GPIO and LED anode)
#         Encoder common → GND; LED cathode → GND; PSU 5 V → VBUS

substitutions:
  name: rotary-lightswitch
  friendly_name: Rotary Light Switch

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-s2-saola-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

logger:

# ── Long press: fire Button Long ~500 ms after press while still held ─────────
# (on_multi_click only completes patterns on release, so HA/LED would lag.)
script:
  - id: encoder_long_press_arm
    mode: restart
    then:
      - delay: 500ms
      - if:
          condition:
            binary_sensor.is_on: encoder_button
          then:
            - binary_sensor.template.publish:
                id: encoder_button_long
                state: true
            - delay: 200ms
            - binary_sensor.template.publish:
                id: encoder_button_long
                state: false

# ── Global: tracks millis() of the last encoder detent ──────────────────────
# Used to compute inter-detent interval → speed in detents/s.
# Not persisted across reboots (intentional: stale timestamp would give a
# false "very slow" reading on the first turn after a reboot, which is fine).
globals:
  - id: last_enc_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

# ── RGB LED behind knob ──────────────────────────────────────────────────────
# R: 470 Ω, G/B: 430 Ω each (current-limiting on GPIO side).
output:
  - platform: ledc
    pin: GPIO4
    id: led_red
    channel: 0
  - platform: ledc
    pin: GPIO5
    id: led_green
    channel: 1
  - platform: ledc
    pin: GPIO6
    id: led_blue
    channel: 2

light:
  - platform: rgb
    name: "Knob LED"
    id: knob_led
    red: led_red
    green: led_green
    blue: led_blue
    restore_mode: ALWAYS_OFF

# ── Sensors ──────────────────────────────────────────────────────────────────
sensor:
  # Raw encoder position (mostly useful for debugging; HA doesn't need to act on it)
  - platform: rotary_encoder
    id: encoder
    name: "Encoder"
    pin_a:
      number: GPIO34
      mode: input_pullup
    pin_b:
      number: GPIO36
      mode: input_pullup
    resolution: 1          # 1 count per detent
    min_value: -32768
    max_value: 32767
    restore_mode: RESTORE_DEFAULT_ZERO
    publish_initial_value: false

    on_clockwise:
      # Compute inter-detent interval on-device (1 ms resolution via millis()).
      # Publish positive speed → HA knows direction + magnitude in one value.
      # Cap at 2000 ms: the first detent after a long pause would otherwise
      # compute near-zero speed (huge delta); treat any gap > 2 s as a slow turn.
      - lambda: |-
          uint32_t now = millis();
          uint32_t delta = now - id(last_enc_ms);
          id(last_enc_ms) = now;
          float speed = (delta > 0 && delta < 2000)
                        ? (1000.0f / (float)delta)
                        : 0.5f;
          id(encoder_speed).publish_state(speed);   // positive = CW
      - binary_sensor.template.publish:
          id: encoder_cw
          state: true
      - delay: 5ms
      - binary_sensor.template.publish:
          id: encoder_cw
          state: false

    on_anticlockwise:
      - lambda: |-
          uint32_t now = millis();
          uint32_t delta = now - id(last_enc_ms);
          id(last_enc_ms) = now;
          float speed = (delta > 0 && delta < 2000)
                        ? (1000.0f / (float)delta)
                        : 0.5f;
          id(encoder_speed).publish_state(-speed);  // negative = CCW
      - binary_sensor.template.publish:
          id: encoder_ccw
          state: true
      - delay: 5ms
      - binary_sensor.template.publish:
          id: encoder_ccw
          state: false

  # Speed sensor: detents per second, signed (+ = CW, − = CCW).
  # Published on every detent alongside the CW/CCW pulse.
  # HA automation reads sign for direction and magnitude for step size.
  - platform: template
    name: "Encoder Speed"
    id: encoder_speed
    unit_of_measurement: "det/s"
    accuracy_decimals: 1
    # No update_interval; published manually from on_clockwise / on_anticlockwise

# ── Encoder push button ───────────────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    id: encoder_button
    name: "Button"
    pin:
      number: GPIO37
      mode: input_pullup
      inverted: true
    on_press:
      - script.execute: encoder_long_press_arm
    on_release:
      - script.stop: encoder_long_press_arm
    on_multi_click:
      # Long press: handled by encoder_long_press_arm (fires while still held).
      # Order matters: longest match first
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.2s
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_double
              state: true
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_double
              state: false
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_single
              state: true
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_single
              state: false

  - platform: template
    id: encoder_button_single
    name: "Button Single"

  - platform: template
    id: encoder_button_double
    name: "Button Double"

  - platform: template
    id: encoder_button_long
    name: "Button Long"

  # Virtual CW / CCW pulses — one per detent, exposed to Home Assistant.
  # The automation can use these OR drive purely off the speed sensor;
  # keeping them means the simple (non-speed-sensitive) blueprint still works.
  - platform: template
    id: encoder_cw
    name: "Encoder CW"

  - platform: template
    id: encoder_ccw
    name: "Encoder CCW"
