# Rotary Light Switch - ESPHome configuration for ESP32-S2 Mini (Lolin S2 Mini)
# EC11 rotary encoder (ENC_A, ENC_B, ENC_BTN) + RGB LED behind knob
# Board: lolin_s2_mini. Upload: hold GPIO0, press RST to enter flash mode.
# Wiring: ENC_A=GPIO34, ENC_B=GPIO36, ENC_BTN=GPIO37; RGB R=GPIO4, G=GPIO5, B=GPIO6 (220 Ω between each GPIO and anode); encoder common → GND; LED cathode → GND; 3V3 for ESP32 only

substitutions:
  name: rotary-lightswitch
  friendly_name: Rotary Light Switch

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-s2-saola-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

logger:

# RGB LED behind knob (feedback / night light); R: 470 Ω, G/B: 430 Ω each (current-limiting on GPIO side)
output:
  - platform: ledc
    pin: GPIO4
    id: led_red
    channel: 0
  - platform: ledc
    pin: GPIO5
    id: led_green
    channel: 1
  - platform: ledc
    pin: GPIO6
    id: led_blue
    channel: 2

light:
  - platform: rgb
    name: "Knob LED"
    id: knob_led
    red: led_red
    green: led_green
    blue: led_blue
    restore_mode: ALWAYS_OFF
# EC11 rotary encoder: ENC_A=pin_a, ENC_B=pin_b; pull-ups enabled in MCU
sensor:
  - platform: rotary_encoder
    id: encoder
    name: "Encoder"
    pin_a:
      number: GPIO34
      mode: input_pullup
    pin_b:
      number: GPIO36
      mode: input_pullup
    # 1 "step" per detent; tweak if your hardware is different
    resolution: 1
    min_value: -32768
    max_value: 32767
    restore_mode: RESTORE_DEFAULT_ZERO
    publish_initial_value: false

    # Each detent step clockwise → one short "press" of encoder_cw
    on_clockwise:
      - binary_sensor.template.publish:
          id: encoder_cw
          state: true
      - delay: 5ms
      - binary_sensor.template.publish:
          id: encoder_cw
          state: false

    # Each detent step counterclockwise → one short "press" of encoder_ccw
    on_anticlockwise:
      - binary_sensor.template.publish:
          id: encoder_ccw
          state: true
      - delay: 5ms
      - binary_sensor.template.publish:
          id: encoder_ccw
          state: false

# Encoder built-in push button (ENC_BTN)
binary_sensor:
  - platform: gpio
    id: encoder_button
    name: "Button"
    pin:
      number: GPIO37
      mode: input_pullup
      inverted: true
    on_multi_click:
      # Order matters: long first, then double, then single
      - timing:
          - ON for at least 0.5s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_long
              state: true
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_long
              state: false
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.2s
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_double
              state: true
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_double
              state: false
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_single
              state: true
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_single
              state: false

  - platform: template
    id: encoder_button_single
    name: "Button Single"

  - platform: template
    id: encoder_button_double
    name: "Button Double"

  - platform: template
    id: encoder_button_long
    name: "Button Long"

  # "Virtual" CW / CCW buttons – exposed to Home Assistant
  - platform: template
    id: encoder_cw
    name: "Encoder CW"

  - platform: template
    id: encoder_ccw
    name: "Encoder CCW"
