# Rotary Light Switch - ESPHome configuration for ESP32-S2 Mini (Lolin S2 Mini)
# EC11 rotary encoder (ENC_A, ENC_B, ENC_BTN) + RGB LED behind knob
# Board: lolin_s2_mini. Upload: hold GPIO0, press RST to enter flash mode.
# Wiring: ENC_A=GPIO34, ENC_B=GPIO36, ENC_BTN=GPIO37; RGB R=GPIO4, G=GPIO5, B=GPIO6 (220 Ω between each GPIO and anode); encoder common → GND; LED cathode → GND; 3V3 for ESP32 only

substitutions:
  name: rotary-lightswitch
  friendly_name: Rotary Light Switch

esp32:
  board: esp32-s2-saola-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

logger:

# RGB LED behind knob (feedback / night light); R: 470 Ω, G/B: 430 Ω each (current-limiting on GPIO side)
output:
  - platform: ledc
    pin: GPIO4
    id: led_red
    channel: 0
  - platform: ledc
    pin: GPIO5
    id: led_green
    channel: 1
  - platform: ledc
    pin: GPIO6
    id: led_blue
    channel: 2

light:
  - platform: rgb
    name: "${friendly_name} Knob LED"
    id: knob_led
    red: led_red
    green: led_green
    blue: led_blue
    restore_mode: ALWAYS_OFF

script:
  - id: encoder_direction_idle_timer
    mode: restart
    then:
      - delay: 50ms
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "idle"
# EC11 rotary encoder: ENC_A=pin_a, ENC_B=pin_b; pull-ups enabled in MCU
sensor:
  - platform: rotary_encoder
    id: encoder
    name: "${friendly_name} Encoder"
    pin_a:
      number: GPIO34
      mode: input_pullup
    pin_b:
      number: GPIO36
      mode: input_pullup
    resolution: 2
    min_value: -32768
    max_value: 32767
    restore_mode: RESTORE_DEFAULT_ZERO
    publish_initial_value: false
    on_clockwise:
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "clockwise"
      - delay: 10ms
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "idle"
    on_anticlockwise:
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "anticlockwise"
      - delay: 10ms
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "idle"

script:
  - id: encoder_direction_idle_timer
    mode: restart
    then:
      - delay: 50ms
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "idle"

# Template text sensors for HA blueprint triggers (state set by automations below)
text_sensor:
  - platform: template
    id: encoder_direction_sensor
    name: "${friendly_name} Encoder Direction"
    lambda: "return {\"idle\"};"
    update_interval: never
  - platform: template
    id: button_action_sensor
    name: "${friendly_name} Button Action"
    lambda: "return {\"idle\"};"
    update_interval: never

# Encoder built-in push button (ENC_BTN)
binary_sensor:
  - platform: gpio
    id: encoder_button
    name: "${friendly_name} Button"
    pin:
      number: GPIO37
      mode: input_pullup
      inverted: true
    on_multi_click:
      # Order matters: long first, then double, then single
      - timing:
          - ON for at least 0.5s
        then:
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "long"
          - delay: 200ms
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "idle"
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.2s
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "double"
          - delay: 200ms
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "idle"
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "single"
          - delay: 200ms
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "idle"
