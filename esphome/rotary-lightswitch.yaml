# Rotary Light Switch - ESPHome configuration for ESP32-S2 Mini (Lolin S2 Mini)
# EC11 rotary encoder (ENC_A, ENC_B, ENC_BTN) + RGB LED behind knob
# Board: lolin_s2_mini. Upload: hold GPIO0, press RST to enter flash mode.
# Wiring: ENC_A=GPIO34, ENC_B=GPIO36, ENC_BTN=GPIO37; RGB R=GPIO4, G=GPIO5, B=GPIO6 (220 Ω between each GPIO and anode); encoder common → GND; LED cathode → GND; 3V3 for ESP32 only

substitutions:
  name: rotary-lightswitch
  friendly_name: Rotary Light Switch

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-s2-saola-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

logger:

# RGB LED behind knob (feedback / night light); R: 470 Ω, G/B: 430 Ω each (current-limiting on GPIO side)
output:
  - platform: ledc
    pin: GPIO4
    id: led_red
    channel: 0
  - platform: ledc
    pin: GPIO5
    id: led_green
    channel: 1
  - platform: ledc
    pin: GPIO6
    id: led_blue
    channel: 2

light:
  - platform: rgb
    name: "Knob LED"
    id: knob_led
    red: led_red
    green: led_green
    blue: led_blue
    restore_mode: ALWAYS_OFF
# EC11 rotary encoder: ENC_A=pin_a, ENC_B=pin_b; pull-ups enabled in MCU
sensor:
  - platform: rotary_encoder
    id: encoder
    name: "Encoder"
    pin_a:
      number: GPIO34
      mode: input_pullup
    pin_b:
      number: GPIO36
      mode: input_pullup
    resolution: 4
    min_value: -32768
    max_value: 32767
    restore_mode: RESTORE_DEFAULT_ZERO
    publish_initial_value: false
    on_value:
      then:
        - lambda: |-
            static int32_t last = 0;
            static uint32_t last_ts = 0;
            const int32_t counts_per_rev = 80;  // 20 detents * 4 transitions per detent
            uint32_t now = millis();
            int32_t current = (int32_t) x;
            if (last_ts == 0) {
              last_ts = now;
              last = current;
              return;
            }
            int32_t delta_counts = current - last;
            if (delta_counts == 0) {
              return;
            }
            uint32_t dt = now - last_ts;
            if (dt == 0) {
              return;
            }
            const float resolution = 4.0f;
            float delta_detents = delta_counts / resolution;
            float speed = delta_detents * 1000.0f / (float) dt;
            id(encoder_speed).publish_state(speed);
            // Delta in degrees for this movement (signed)
            float delta_degrees = (float) delta_counts * 360.0f / (float) counts_per_rev;
            id(encoder_delta_degrees).publish_state(delta_degrees);
            // Absolute angle within one revolution [0, 360)
            int32_t mod_counts = current % counts_per_rev;
            if (mod_counts < 0) {
              mod_counts += counts_per_rev;
            }
            float angle_degrees = (float) mod_counts * 360.0f / (float) counts_per_rev;
            id(encoder_angle_degrees).publish_state(angle_degrees);
            // Signed RPM based on this movement
            float rev_per_sec = ((float) delta_counts / (float) counts_per_rev) * 1000.0f / (float) dt;
            float rpm = rev_per_sec * 60.0f;
            id(encoder_rpm).publish_state(rpm);
            last = current;
            last_ts = now;
        - script.execute: encoder_speed_idle_timer
    on_clockwise:
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "clockwise"
      - delay: 10ms
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "idle"
    on_anticlockwise:
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "anticlockwise"
      - delay: 10ms
      - text_sensor.template.publish:
          id: encoder_direction_sensor
          state: "idle"

  - platform: template
    id: encoder_speed
    name: "Encoder Speed"
    unit_of_measurement: "detents/s"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    id: encoder_rpm
    name: "Encoder RPM"
    unit_of_measurement: "rpm"
    accuracy_decimals: 2
    update_interval: never

  - platform: template
    id: encoder_angle_degrees
    name: "Encoder Angle"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    id: encoder_delta_degrees
    name: "Encoder Delta Degrees"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    update_interval: never

script:
  - id: encoder_speed_idle_timer
    mode: restart
    then:
      - delay: 50ms
      - sensor.template.publish:
          id: encoder_speed
          state: 0.0
      - sensor.template.publish:
          id: encoder_rpm
          state: 0.0
      - sensor.template.publish:
          id: encoder_delta_degrees
          state: 0.0

# Template text sensors for HA blueprint triggers (state set by automations below)
text_sensor:
  - platform: template
    id: encoder_direction_sensor
    name: "Encoder Direction"
    lambda: "return {\"idle\"};"
    update_interval: never
  - platform: template
    id: button_action_sensor
    name: "Button Action"
    lambda: "return {\"idle\"};"
    update_interval: never

# Encoder built-in push button (ENC_BTN)
binary_sensor:
  - platform: gpio
    id: encoder_button
    name: "Button"
    pin:
      number: GPIO37
      mode: input_pullup
      inverted: true
    on_multi_click:
      # Order matters: long first, then double, then single
      - timing:
          - ON for at least 0.5s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_long
              state: true
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "long"
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_long
              state: false
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "idle"
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.2s
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_double
              state: true
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "double"
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_double
              state: false
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "idle"
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          - binary_sensor.template.publish:
              id: encoder_button_single
              state: true
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "single"
          - delay: 200ms
          - binary_sensor.template.publish:
              id: encoder_button_single
              state: false
          - text_sensor.template.publish:
              id: button_action_sensor
              state: "idle"

  - platform: template
    id: encoder_button_single
    name: "Button Single"

  - platform: template
    id: encoder_button_double
    name: "Button Double"

  - platform: template
    id: encoder_button_long
    name: "Button Long"
